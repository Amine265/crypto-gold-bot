name: Bot Crypto & Or

on:
  schedule:
    - cron: "5 * * * *"   # toutes les heures, à H:05
  workflow_dispatch:        # lancement manuel pour tester

permissions:
  contents: write           # nécessaire pour publier data.json vers le cockpit

concurrency:
  group: bot-crypto-or      # jamais deux runs en même temps (protège le push)
  cancel-in-progress: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Signaux de marché (crypto + or)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Copytrading paper (top traders Hyperliquid)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_WALLET: ${{ secrets.MY_WALLET }}
        run: python copytrader.py

      - name: Publier les données du cockpit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A state.json state_copy.json docs/data.json || true
          git diff --cached --quiet || git commit -m "maj données cockpit"
          git pull --rebase origin main
          git push
