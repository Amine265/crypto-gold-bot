name: Signaux Crypto & Or

on:
  schedule:
    - cron: "*/15 * * * *"  # toutes les 15 minutes
  workflow_dispatch:        # lancement manuel pour tester
    inputs:
      test_blanc:
        description: "Test à blanc de l'agent Kraken (validation sans rien placer)"
        type: boolean
        default: false

permissions:
  contents: write           # nécessaire pour publier data.json vers le cockpit

concurrency:
  group: bot-crypto-or      # partagé avec le copytrading : jamais deux runs en même temps
  cancel-in-progress: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # checkout fige le commit du déclenchement ; un run mis en file par la
      # concurrence doit d'abord récupérer ce que le run précédent a poussé
      - name: Se placer sur la pointe de main
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Signaux de marché (crypto + or)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Agent Kraken
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KRAKEN_KEY: ${{ secrets.KRAKEN_KEY }}
          KRAKEN_SECRET: ${{ secrets.KRAKEN_SECRET }}
          FLAGS_URL: ${{ secrets.FLAGS_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
        run: |
          if [ "${{ inputs.test_blanc }}" = "true" ]; then
            TEST_BLANC=1 python agent.py
          else
            python agent.py
          fi

      - name: Publier les données du cockpit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A state.json docs/data.json || true
          [ -f agent_state.json ] && git add agent_state.json || true
          git diff --cached --quiet || git commit -m "maj données cockpit (signaux)"
          git pull --rebase origin main
          git push
