name: Copytrading paper

on:
  schedule:
    - cron: "5 * * * *"     # toutes les heures, à H:05
  workflow_dispatch:        # lancement manuel pour tester

permissions:
  contents: write           # nécessaire pour publier data.json vers le cockpit

concurrency:
  group: bot-crypto-or      # partagé avec les signaux : jamais deux runs en même temps
  cancel-in-progress: false

jobs:
  copytrading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # checkout fige le commit du déclenchement ; un run mis en file par la
      # concurrence doit d'abord récupérer ce que le run précédent a poussé
      - name: Se placer sur la pointe de main
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Copytrading paper (top traders Hyperliquid)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_WALLET: ${{ secrets.MY_WALLET }}
        run: python copytrader.py

      - name: Publier les données du cockpit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A state_copy.json docs/data.json || true
          git diff --cached --quiet || git commit -m "maj données cockpit (copytrading)"
          git pull --rebase origin main
          git push
